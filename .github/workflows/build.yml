# ============================================
# Juicity-RS Build & Release CI
# ============================================
# Supported platforms:
#   Linux glibc  (zigbuild): x86_64, aarch64, i686, armv7, riscv64gc, loongarch64
#   Linux musl   (zigbuild): x86_64, aarch64, i686, armv7, riscv64gc, loongarch64
#   Windows gnullvm (static): x86_64, aarch64  (via MSYS2 CLANG64/CLANGARM64)
#   macOS        (native)  : x86_64, aarch64
#   FreeBSD      (cross)   : x86_64
# ============================================

name: Build & Release

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  release:
    types: [published]

env:
  CARGO_TERM_COLOR: always

jobs:
  # --------------------------------------------------
  # Linux glibc — zigbuild
  # --------------------------------------------------
  linux-glibc:
    name: Linux glibc (${{ matrix.target }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - x86_64-unknown-linux-gnu
          - aarch64-unknown-linux-gnu
          - i686-unknown-linux-gnu
          - armv7-unknown-linux-gnueabihf
          - riscv64gc-unknown-linux-gnu
          - loongarch64-unknown-linux-gnu
    steps:
      - uses: actions/checkout@v6.0.2

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: stable
          targets: ${{ matrix.target }}

      - name: Install Zig
        uses: mlugg/setup-zig@v2.2.1
        with:
          version: master

      - name: Install cargo-zigbuild
        uses: taiki-e/install-action@v2.78.3
        with:
          tool: cargo-zigbuild

      - name: Install GTK4 dev libraries
        if: startsWith(matrix.target, 'x86_64') || startsWith(matrix.target, 'aarch64')
        shell: bash
        run: |
          sudo apt-get update -q
          if [[ "${{ matrix.target }}" == aarch64-* ]]; then
            sudo dpkg --add-architecture arm64
            sudo apt-get update -q
            sudo apt-get install -y libgtk-4-dev:arm64 pkg-config
          else
            sudo apt-get install -y libgtk-4-dev pkg-config
          fi

      - name: Build with zigbuild
        shell: bash
        run: |
          if [[ "${{ matrix.target }}" == x86_64-* || "${{ matrix.target }}" == aarch64-* ]]; then
            if [[ "${{ matrix.target }}" == aarch64-* ]]; then
              export PKG_CONFIG_ALLOW_CROSS=1
              export PKG_CONFIG_PATH=/usr/lib/aarch64-linux-gnu/pkgconfig
            fi
            cargo zigbuild --release --target ${{ matrix.target }}
          else
            cargo zigbuild --release --target ${{ matrix.target }} --exclude juicity-gui
          fi

      - name: Prepare package
        shell: bash
        run: |
          PKG_NAME="juicity-${{ matrix.target }}"
          mkdir -p "dist/${PKG_NAME}"
          cp "target/${{ matrix.target }}/release/juicity-client" "dist/${PKG_NAME}/"
          cp "target/${{ matrix.target }}/release/juicity-server" "dist/${PKG_NAME}/"
          if [[ "${{ matrix.target }}" == x86_64-* || "${{ matrix.target }}" == aarch64-* ]]; then
            cp "target/${{ matrix.target }}/release/juicity-gui" "dist/${PKG_NAME}/"
          fi
          cp juicity-client/examples/config.json "dist/${PKG_NAME}/client-config.json"
          cp juicity-server/examples/config.json "dist/${PKG_NAME}/server-config.json"

      - name: Package zip
        run: |
          cd dist
          zip -r "../juicity-${{ matrix.target }}.zip" "juicity-${{ matrix.target }}/"

      - name: Upload artifact
        uses: actions/upload-artifact@v7.0.1
        with:
          name: juicity-${{ matrix.target }}
          path: juicity-${{ matrix.target }}.zip
          if-no-files-found: error

  # --------------------------------------------------
  # Linux musl — zigbuild
  # --------------------------------------------------
  linux-musl:
    name: Linux musl (${{ matrix.target }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - x86_64-unknown-linux-musl
          - aarch64-unknown-linux-musl
          - i686-unknown-linux-musl
          - armv7-unknown-linux-musleabihf
          - riscv64gc-unknown-linux-musl
          - loongarch64-unknown-linux-musl
    steps:
      - uses: actions/checkout@v6.0.2

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: stable
          targets: ${{ matrix.target }}

      - name: Install Zig
        uses: mlugg/setup-zig@v2.2.1
        with:
          version: master

      - name: Install cargo-zigbuild
        uses: taiki-e/install-action@v2.78.3
        with:
          tool: cargo-zigbuild

      - name: Build with zigbuild
        continue-on-error: ${{ contains(matrix.target, 'loongarch64') }}
        run: cargo zigbuild --release --target ${{ matrix.target }} --exclude juicity-gui

      - name: Check if build succeeded
        id: check_build
        shell: bash
        run: |
          if [ -f "target/${{ matrix.target }}/release/juicity-client" ] && [ -f "target/${{ matrix.target }}/release/juicity-server" ]; then
            echo "build_ok=true" >> "$GITHUB_OUTPUT"
          else
            echo "build_ok=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Prepare package
        if: steps.check_build.outputs.build_ok == 'true'
        shell: bash
        run: |
          PKG_NAME="juicity-${{ matrix.target }}"
          mkdir -p "dist/${PKG_NAME}"
          cp "target/${{ matrix.target }}/release/juicity-client" "dist/${PKG_NAME}/"
          cp "target/${{ matrix.target }}/release/juicity-server" "dist/${PKG_NAME}/"
          cp juicity-client/examples/config.json "dist/${PKG_NAME}/client-config.json"
          cp juicity-server/examples/config.json "dist/${PKG_NAME}/server-config.json"

      - name: Package zip
        if: steps.check_build.outputs.build_ok == 'true'
        run: |
          cd dist
          zip -r "../juicity-${{ matrix.target }}.zip" "juicity-${{ matrix.target }}/"

      - name: Upload artifact
        if: steps.check_build.outputs.build_ok == 'true'
        uses: actions/upload-artifact@v7.0.1
        with:
          name: juicity-${{ matrix.target }}
          path: juicity-${{ matrix.target }}.zip
          if-no-files-found: warn

  # --------------------------------------------------
  # Windows gnullvm — static compile via MSYS2
  # --------------------------------------------------
  windows-gnullvm:
    name: Windows gnullvm (${{ matrix.target }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-pc-windows-gnullvm
            runner: windows-latest
            msystem: CLANG64
          - target: aarch64-pc-windows-gnullvm
            runner: windows-11-arm
            msystem: CLANGARM64
    steps:
      - uses: actions/checkout@v6.0.2

      - name: Install MSYS2 toolchain (gnullvm)
        uses: msys2/setup-msys2@v2.31.1
        with:
          msystem: ${{ matrix.msystem }}
          update: true
          install: >-
            mingw-w64-${{ matrix.msystem == 'CLANG64' && 'clang-x86_64' || 'clang-aarch64' }}-clang
            mingw-w64-${{ matrix.msystem == 'CLANG64' && 'clang-x86_64' || 'clang-aarch64' }}-lld
            mingw-w64-${{ matrix.msystem == 'CLANG64' && 'clang-x86_64' || 'clang-aarch64' }}-llvm
            mingw-w64-${{ matrix.msystem == 'CLANG64' && 'clang-x86_64' || 'clang-aarch64' }}-rust
            mingw-w64-${{ matrix.msystem == 'CLANG64' && 'clang-x86_64' || 'clang-aarch64' }}-gtk4
            mingw-w64-${{ matrix.msystem == 'CLANG64' && 'clang-x86_64' || 'clang-aarch64' }}-pkg-config

      - name: Build (static CRT)
        shell: msys2 {0}
        env:
          RUSTFLAGS: -C target-feature=+crt-static
        run: |
          cargo build --release --target ${{ matrix.target }}

      - name: Prepare package
        shell: msys2 {0}
        run: |
          PKG_NAME="juicity-${{ matrix.target }}"
          mkdir -p "dist/${PKG_NAME}"
          cp "target/${{ matrix.target }}/release/juicity-client.exe" "dist/${PKG_NAME}/"
          cp "target/${{ matrix.target }}/release/juicity-server.exe" "dist/${PKG_NAME}/"
          cp "target/${{ matrix.target }}/release/juicity-gui.exe"    "dist/${PKG_NAME}/"
          cp juicity-client/examples/config.json "dist/${PKG_NAME}/client-config.json"
          cp juicity-server/examples/config.json "dist/${PKG_NAME}/server-config.json"

      - name: Package zip
        shell: pwsh
        run: |
          Set-Location -Path dist
          Compress-Archive -Path "juicity-${{ matrix.target }}/" -DestinationPath "../juicity-${{ matrix.target }}.zip" -Force

      - name: Upload artifact
        uses: actions/upload-artifact@v7.0.1
        with:
          name: juicity-${{ matrix.target }}
          path: juicity-${{ matrix.target }}.zip
          if-no-files-found: error

  # --------------------------------------------------
  # macOS — native build
  # --------------------------------------------------
  macos:
    name: macOS (${{ matrix.target }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-apple-darwin
            runner: macos-26-intel
          - target: aarch64-apple-darwin
            runner: macos-latest
    steps:
      - uses: actions/checkout@v6.0.2

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: stable
          targets: ${{ matrix.target }}

      - name: Install GTK4 (Homebrew)
        run: brew install gtk4

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Prepare package
        shell: bash
        run: |
          PKG_NAME="juicity-${{ matrix.target }}"
          mkdir -p "dist/${PKG_NAME}"
          cp "target/${{ matrix.target }}/release/juicity-client" "dist/${PKG_NAME}/"
          cp "target/${{ matrix.target }}/release/juicity-server" "dist/${PKG_NAME}/"
          cp "target/${{ matrix.target }}/release/juicity-gui"    "dist/${PKG_NAME}/"
          cp juicity-client/examples/config.json "dist/${PKG_NAME}/client-config.json"
          cp juicity-server/examples/config.json "dist/${PKG_NAME}/server-config.json"

      - name: Package zip
        run: |
          cd dist
          zip -r "../juicity-${{ matrix.target }}.zip" "juicity-${{ matrix.target }}/"

      - name: Upload artifact
        uses: actions/upload-artifact@v7.0.1
        with:
          name: juicity-${{ matrix.target }}
          path: juicity-${{ matrix.target }}.zip
          if-no-files-found: error

  # --------------------------------------------------
  # FreeBSD — cross build via actions-rust-cross
  # --------------------------------------------------
  freebsd:
    name: FreeBSD x86_64
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: stable
          targets: x86_64-unknown-freebsd

      - name: Build (cross)
        uses: houseabsolute/actions-rust-cross@v1
        with:
          command: build
          target: x86_64-unknown-freebsd
          args: "--release --exclude juicity-gui"

      - name: Prepare package
        shell: bash
        run: |
          PKG_NAME="juicity-x86_64-unknown-freebsd"
          mkdir -p "dist/${PKG_NAME}"
          cp "target/x86_64-unknown-freebsd/release/juicity-client" "dist/${PKG_NAME}/" || true
          cp "target/x86_64-unknown-freebsd/release/juicity-server" "dist/${PKG_NAME}/" || true
          cp juicity-client/examples/config.json "dist/${PKG_NAME}/client-config.json"
          cp juicity-server/examples/config.json "dist/${PKG_NAME}/server-config.json"

      - name: Package zip
        run: |
          cd dist
          zip -r "../juicity-x86_64-unknown-freebsd.zip" "juicity-x86_64-unknown-freebsd/"

      - name: Upload artifact
        uses: actions/upload-artifact@v7.0.1
        with:
          name: juicity-x86_64-unknown-freebsd
          path: juicity-x86_64-unknown-freebsd.zip
          if-no-files-found: warn

  # --------------------------------------------------
  # Release — attach all artifacts to GitHub Release
  # --------------------------------------------------
  release:
    name: Attach to Release
    if: github.event_name == 'release' && github.event.action == 'published'
    needs:
      - linux-glibc
      - linux-musl
      - windows-gnullvm
      - macos
      - freebsd
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v8.0.1
        with:
          path: artifacts

      - name: Upload to Release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        shell: bash
        run: |
          shopt -s globstar
          for zipfile in artifacts/**/*.zip; do
            echo "Uploading: $zipfile"
            gh release upload "${{ github.event.release.tag_name }}" "$zipfile" --clobber -R "$GH_REPO"
          done
