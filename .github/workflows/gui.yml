# ============================================
# Juicity GUI — Native Build CI
# Packages: juicity-gui + juicity-client + sslocal + ssurl
# Platforms: Linux glibc x86_64/aarch64 (native),
#            Windows x86_64/aarch64 (MSYS2 gnullvm, with DLL bundle),
#            macOS x86_64/aarch64 (native)
# ============================================

name: Build GUI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  release:
    types: [published]

env:
  CARGO_TERM_COLOR: always

jobs:
  # --------------------------------------------------
  # GUI native build matrix
  # --------------------------------------------------
  gui:
    name: GUI (${{ matrix.name }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-x86_64
            runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            ss_suffix: x86_64-unknown-linux-gnu.tar.xz
            os: linux

          - name: linux-aarch64
            runner: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            ss_suffix: aarch64-unknown-linux-gnu.tar.xz
            os: linux

          - name: windows-x86_64
            runner: windows-latest
            target: x86_64-pc-windows-gnullvm
            ss_suffix: x86_64-pc-windows-msvc.zip
            msystem: CLANG64
            msystem_arch: clang-x86_64
            os: windows

          # windows-aarch64 disabled: shadowsocks-rust has no aarch64-pc-windows binary yet
          # - name: windows-aarch64
          #   runner: windows-11-arm
          #   target: aarch64-pc-windows-gnullvm
          #   ss_suffix: aarch64-pc-windows-msvc.zip
          #   msystem: CLANGARM64
          #   msystem_arch: clang-aarch64
          #   os: windows

          - name: macos-x86_64
            runner: macos-26-intel
            target: x86_64-apple-darwin
            ss_suffix: x86_64-apple-darwin.tar.xz
            os: macos

          - name: macos-aarch64
            runner: macos-latest
            target: aarch64-apple-darwin
            ss_suffix: aarch64-apple-darwin.tar.xz
            os: macos

    steps:
      - uses: actions/checkout@v6.0.2

      # ── Install dependencies ─────────────────────────────────────────────

      - name: Install GTK4 + build tools (Linux)
        if: matrix.os == 'linux'
        run: |
          sudo apt-get update -q
          sudo apt-get install -y libgtk-4-dev libadwaita-1-dev pkg-config

      - name: Install GTK4 (macOS)
        if: matrix.os == 'macos'
        run: brew install gtk4 libadwaita

      - name: Install Rust toolchain (Linux/macOS)
        if: matrix.os != 'windows'
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: stable
          targets: ${{ matrix.target }}

      - name: Setup MSYS2 (Windows)
        if: matrix.os == 'windows'
        uses: msys2/setup-msys2@v2.31.1
        with:
          msystem: ${{ matrix.msystem }}
          update: true
          install: >-
            mingw-w64-${{ matrix.msystem_arch }}-clang
            mingw-w64-${{ matrix.msystem_arch }}-lld
            mingw-w64-${{ matrix.msystem_arch }}-llvm
            mingw-w64-${{ matrix.msystem_arch }}-rust
            mingw-w64-${{ matrix.msystem_arch }}-gtk4
            mingw-w64-${{ matrix.msystem_arch }}-libadwaita
            mingw-w64-${{ matrix.msystem_arch }}-pkg-config

      # ── Build ────────────────────────────────────────────────────────────

      - name: Build (Linux/macOS)
        if: matrix.os != 'windows'
        run: cargo build --workspace --release --target ${{ matrix.target }} --exclude juicity-server

      - name: Build (Windows)
        if: matrix.os == 'windows'
        shell: msys2 {0}
        run: cargo build --workspace --release --target ${{ matrix.target }} --exclude juicity-server

      # ── Test ────────────────────────────────────────────────────────────

      - name: Run tests (Linux/macOS)
        if: matrix.os != 'windows'
        run: cargo test -p juicity-gui --target ${{ matrix.target }}

      - name: Run tests (Windows, clear POSIX env vars to validate i18n fallback)
        if: matrix.os == 'windows'
        shell: msys2 {0}
        run: |
          unset LANG LC_ALL LC_MESSAGES
          cargo test -p juicity-gui --target ${{ matrix.target }}

      # ── Download shadowsocks-rust ─────────────────────────────────────────

      - name: Download shadowsocks-rust (Linux/macOS)
        if: matrix.os != 'windows'
        shell: bash
        run: |
          SS_TAG=$(curl -sSf "https://api.github.com/repos/shadowsocks/shadowsocks-rust/releases/latest" \
            | grep '"tag_name"' | head -1 | sed 's/.*"\(v[^"]*\)".*/\1/')
          echo "Downloading shadowsocks-rust ${SS_TAG}"
          curl -sSfL \
            "https://github.com/shadowsocks/shadowsocks-rust/releases/download/${SS_TAG}/shadowsocks-${SS_TAG}.${{ matrix.ss_suffix }}" \
            -o /tmp/ss.tar.xz
          mkdir -p /tmp/ss
          tar -xJf /tmp/ss.tar.xz -C /tmp/ss
          echo "SS_DIR=/tmp/ss" >> "$GITHUB_ENV"

      - name: Download shadowsocks-rust (Windows)
        if: matrix.os == 'windows'
        shell: pwsh
        run: |
          $tag = (Invoke-RestMethod "https://api.github.com/repos/shadowsocks/shadowsocks-rust/releases/latest").tag_name
          Write-Host "Downloading shadowsocks-rust $tag"
          $url = "https://github.com/shadowsocks/shadowsocks-rust/releases/download/$tag/shadowsocks-$tag.${{ matrix.ss_suffix }}"
          Invoke-WebRequest -Uri $url -OutFile "$env:TEMP\ss.zip"
          Expand-Archive -Path "$env:TEMP\ss.zip" -DestinationPath "$env:TEMP\ss" -Force
          Add-Content $env:GITHUB_ENV "SS_DIR=$env:TEMP\ss"

      # ── Prepare package ───────────────────────────────────────────────────

      - name: Prepare package (Linux/macOS)
        if: matrix.os != 'windows'
        shell: bash
        run: |
          PKG_NAME="juicity-gui-${{ matrix.name }}"
          mkdir -p "dist/${PKG_NAME}"
          cp "target/${{ matrix.target }}/release/juicity-gui"    "dist/${PKG_NAME}/"
          cp "target/${{ matrix.target }}/release/juicity-client" "dist/${PKG_NAME}/"
          cp "${SS_DIR}/sslocal" "dist/${PKG_NAME}/"
          cp "${SS_DIR}/ssurl"   "dist/${PKG_NAME}/"
          cp juicity-client/examples/config.json "dist/${PKG_NAME}/client-config.json"

      - name: Prepare package + collect DLLs (Windows)
        if: matrix.os == 'windows'
        shell: msys2 {0}
        run: |
          PKG_NAME="juicity-gui-${{ matrix.name }}"
          PKG_DIR="$(pwd)/dist/${PKG_NAME}"
          mkdir -p "${PKG_DIR}"

          # Copy built binaries
          cp "target/${{ matrix.target }}/release/juicity-gui.exe"    "${PKG_DIR}/"
          cp "target/${{ matrix.target }}/release/juicity-client.exe" "${PKG_DIR}/"

          # Copy shadowsocks-rust binaries (convert Windows path to MSYS2 path)
          SS_UNIX=$(cygpath -u "${SS_DIR}")
          cp "${SS_UNIX}/sslocal.exe" "${PKG_DIR}/"
          cp "${SS_UNIX}/ssurl.exe"   "${PKG_DIR}/"

          cp juicity-client/examples/config.json "${PKG_DIR}/client-config.json"

          # Collect DLL dependencies recursively for all EXEs
          declare -A seen
          queue=("${PKG_DIR}/juicity-gui.exe" "${PKG_DIR}/juicity-client.exe")
          while [[ ${#queue[@]} -gt 0 ]]; do
            bin="${queue[0]}"; queue=("${queue[@]:1}")
            [[ -f "$bin" ]] || continue
            while IFS= read -r dll; do
              name=$(basename "$dll")
              [[ -n "${seen[$name]+x}" ]] && continue
              seen[$name]=1
              cp "$dll" "${PKG_DIR}/"
              queue+=("${PKG_DIR}/${name}")
            done < <(ldd "$bin" 2>/dev/null | awk '/=> \// {print $3}' | grep -v '/c/[Ww]indows')
          done

          # GTK4 runtime data
          PREFIX="${MSYSTEM_PREFIX}"

          # GLib schemas
          mkdir -p "${PKG_DIR}/share/glib-2.0/schemas"
          [[ -f "${PREFIX}/share/glib-2.0/schemas/gschemas.compiled" ]] && \
            cp "${PREFIX}/share/glib-2.0/schemas/gschemas.compiled" "${PKG_DIR}/share/glib-2.0/schemas/"

          # GDK-pixbuf loaders
          if [[ -d "${PREFIX}/lib/gdk-pixbuf-2.0" ]]; then
            mkdir -p "${PKG_DIR}/lib"
            cp -r "${PREFIX}/lib/gdk-pixbuf-2.0" "${PKG_DIR}/lib/"
            # Also collect DLL deps of the loaders themselves
            shopt -s globstar
            for loader in "${PKG_DIR}/lib/gdk-pixbuf-2.0/"**/*.dll; do
              [[ -f "$loader" ]] || continue
              while IFS= read -r dll; do
                name=$(basename "$dll")
                [[ -n "${seen[$name]+x}" ]] && continue
                seen[$name]=1
                cp "$dll" "${PKG_DIR}/"
              done < <(ldd "$loader" 2>/dev/null | awk '/=> \// {print $3}' | grep -v '/c/[Ww]indows')
            done
          fi

          # GTK4 modules (print backends, media backends)
          [[ -d "${PREFIX}/lib/gtk-4.0" ]] && \
            { mkdir -p "${PKG_DIR}/lib"; cp -r "${PREFIX}/lib/gtk-4.0" "${PKG_DIR}/lib/"; }

          # Hicolor icon theme
          [[ -d "${PREFIX}/share/icons/hicolor" ]] && \
            { mkdir -p "${PKG_DIR}/share/icons"; cp -r "${PREFIX}/share/icons/hicolor" "${PKG_DIR}/share/icons/"; }

      # ── Package zip ───────────────────────────────────────────────────────

      - name: Package zip (Linux/macOS)
        if: matrix.os != 'windows'
        run: |
          cd dist
          zip -r "../juicity-gui-${{ matrix.name }}.zip" "juicity-gui-${{ matrix.name }}/"

      - name: Package zip (Windows)
        if: matrix.os == 'windows'
        shell: pwsh
        run: |
          Set-Location dist
          Compress-Archive -Path "juicity-gui-${{ matrix.name }}/" -DestinationPath "../juicity-gui-${{ matrix.name }}.zip" -Force

      # ── Upload artifact ───────────────────────────────────────────────────

      - name: Upload artifact
        uses: actions/upload-artifact@v7.0.1
        with:
          name: juicity-gui-${{ matrix.name }}
          path: juicity-gui-${{ matrix.name }}.zip
          if-no-files-found: error

  # --------------------------------------------------
  # Release — attach GUI artifacts to GitHub Release
  # --------------------------------------------------
  release:
    name: Attach GUI artifacts to Release
    if: github.event_name == 'release' && github.event.action == 'published'
    needs: [gui]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download GUI artifacts
        uses: actions/download-artifact@v8.0.1
        with:
          pattern: juicity-gui-*
          path: artifacts

      - name: Upload to Release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        shell: bash
        run: |
          shopt -s globstar
          for zipfile in artifacts/**/*.zip; do
            echo "Uploading: $zipfile"
            gh release upload "${{ github.event.release.tag_name }}" "$zipfile" --clobber -R "$GH_REPO"
          done
